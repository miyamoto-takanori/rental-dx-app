<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出発準備一覧</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="title">出発準備一覧（外回り）</div>

  <div class="time-area">
    <span class="clock-icon icon-svg" aria-hidden="true">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="9" />
        <polyline points="12 7 12 12 15 15" />
      </svg>
    </span>
    <span id="time"></span>
    <span class="date" id="date"></span>
  </div>

  <button class="refresh" onclick="render()">
    🔄
  </button>
</header>

<div class="tabs">
  <span class="tab active">すべて</span>
  <span class="tab">受付済</span>
  <span class="tab preparing">準備中</span>
  <span class="tab done">準備完了</span>
</div>

<table>
  <thead>
    <tr>
      <th>呼出</th>
      <th>出発</th>
      <th>車種</th>
      <th>車番</th>
      <th>情報</th>
      <th>場所</th>
      <th>状態</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script src="data/mockData.js"></script>
<script src="app.js"></script>
</body>
</html>
